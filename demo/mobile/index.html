<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>offlineSync — Client de test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            color: #e2e8f0;
        }

        /* ── Layout ── */
        .app-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            grid-template-rows: 56px 1fr;
            height: 100vh;
            gap: 0;
        }

        @media (max-width: 900px) {
            .app-layout { grid-template-columns: 1fr; grid-template-rows: 56px 1fr auto; }
            .sidebar { max-height: 300px; overflow-y: auto; }
        }

        /* ── Topbar ── */
        .topbar {
            grid-column: 1 / -1;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
        }

        .topbar-brand { font-weight: 700; font-size: 1.1rem; color: #fff; }
        .topbar-brand span { color: #6366f1; }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .status-dot {
            width: 9px; height: 9px; border-radius: 50%;
            background: #4ade80;
            transition: background 0.3s;
        }
        .status-dot.offline { background: #f87171; }
        .status-dot.simulated-offline { background: #fb923c; }
        .status-dot.syncing { background: #facc15; animation: blink 0.8s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .topbar-actions { margin-left: auto; display: flex; gap: 8px; }

        .btn {
            padding: 7px 14px;
            border-radius: 8px;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-primary   { background: #6366f1; color: #fff; }
        .btn-primary:hover { background: #4f46e5; }
        .btn-outline   { background: transparent; border: 1.5px solid #475569; color: #94a3b8; }
        .btn-outline:hover { border-color: #94a3b8; color: #e2e8f0; }
        .btn-danger    { background: #dc2626; color: #fff; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-warning   { background: #d97706; color: #fff; }
        .btn-warning:hover { background: #b45309; }
        .btn:disabled  { opacity: 0.5; cursor: not-allowed; }

        /* ── Main area ── */
        .main-area {
            padding: 24px;
            overflow-y: auto;
            background: #0f172a;
        }

        /* ── Sidebar ── */
        .sidebar {
            background: #1e293b;
            border-left: 1px solid #334155;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar-section {
            border-bottom: 1px solid #334155;
            padding: 16px;
        }
        .sidebar-section:last-child { border-bottom: none; }

        .sidebar-title {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-badge {
            background: #6366f1;
            color: #fff;
            border-radius: 9999px;
            padding: 1px 7px;
            font-size: 0.7rem;
        }

        /* ── Queue ── */
        .queue-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 6px;
            background: #0f172a;
            margin-bottom: 4px;
            font-size: 0.78rem;
        }
        .queue-op {
            font-weight: 700;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            min-width: 48px;
            text-align: center;
        }
        .queue-create .queue-op { background: #166534; color: #4ade80; }
        .queue-update .queue-op { background: #1e3a8a; color: #93c5fd; }
        .queue-delete .queue-op { background: #7f1d1d; color: #fca5a5; }
        .queue-resource { color: #a5f3fc; }
        .queue-id       { color: #64748b; font-size: 0.72rem; }
        .queue-time     { color: #475569; font-size: 0.7rem; margin-left: auto; }
        .queue-empty    { color: #475569; font-size: 0.8rem; text-align: center; padding: 8px 0; }

        /* ── Conflicts ── */
        .conflict-item {
            background: #7f1d1d22;
            border: 1px solid #7f1d1d;
            border-radius: 6px;
            padding: 8px;
            margin-bottom: 4px;
            font-size: 0.78rem;
        }
        .conflict-resource { color: #fca5a5; font-weight: 600; margin-bottom: 4px; }
        .conflict-detail { display: flex; gap: 8px; color: #94a3b8; flex-wrap: wrap; }

        /* ── Sync log ── */
        #syncLog { max-height: 200px; overflow-y: auto; }
        .log-entry {
            display: flex;
            gap: 8px;
            font-size: 0.75rem;
            padding: 3px 0;
            border-bottom: 1px solid #0f172a;
        }
        .log-time    { color: #475569; flex-shrink: 0; }
        .log-success { color: #4ade80; }
        .log-error   { color: #f87171; }
        .log-warning { color: #fb923c; }
        .log-queued  { color: #facc15; }
        .log-info    { color: #94a3b8; }

        /* ── Stats bar ── */
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat {
            flex: 1;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }
        .stat-number { font-size: 1.8rem; font-weight: 700; color: #6366f1; }
        .stat-label  { font-size: 0.75rem; color: #64748b; margin-top: 2px; }

        /* ── Add task form ── */
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #e2e8f0; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; font-weight: 500; color: #94a3b8; margin-bottom: 5px; }

        input, textarea, select {
            width: 100%;
            padding: 9px 12px;
            background: #0f172a;
            border: 1.5px solid #334155;
            border-radius: 7px;
            color: #e2e8f0;
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #6366f1;
        }
        input::placeholder, textarea::placeholder { color: #475569; }
        textarea { resize: vertical; min-height: 64px; }

        /* ── Task list ── */
        .tasks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .tasks-header h2 { font-size: 1rem; font-weight: 600; }

        .task-item {
            background: #1e293b;
            border: 1.5px solid #334155;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: border-color 0.2s;
        }
        .task-item:hover { border-color: #6366f1; }
        .task-item.completed { opacity: 0.55; }
        .task-item.pending-sync { border-color: #d97706; }

        .task-checkbox {
            width: 22px; height: 22px;
            border: 2px solid #475569;
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .task-checkbox.checked { background: #4ade80; border-color: #4ade80; }
        .task-checkbox.checked::after { content: '✓'; color: #0f172a; font-weight: 700; font-size: 13px; }

        .task-content { flex: 1; min-width: 0; }
        .task-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .task-item.completed .task-title { text-decoration: line-through; color: #64748b; }
        .task-description { font-size: 0.82rem; color: #64748b; margin-bottom: 6px; }

        .task-meta { display: flex; gap: 8px; flex-wrap: wrap; }
        .task-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 500;
        }
        .priority-high   { background: #7f1d1d33; color: #fca5a5; border: 1px solid #7f1d1d; }
        .priority-medium { background: #78350f33; color: #fcd34d; border: 1px solid #78350f; }
        .priority-low    { background: #14532d33; color: #86efac; border: 1px solid #14532d; }
        .due-date        { background: #164e6333; color: #67e8f9; border: 1px solid #164e63; }
        .overdue         { background: #7f1d1d33; color: #fca5a5; border: 1px solid #7f1d1d; }
        .pending-badge   { background: #78350f33; color: #fbbf24; border: 1px solid #78350f; }

        .task-actions { display: flex; gap: 6px; }
        .task-action-btn {
            width: 30px; height: 30px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.15s;
            background: #7f1d1d22;
            border: 1px solid #7f1d1d55;
        }
        .task-action-btn:hover { background: #7f1d1d; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #475569;
        }
        .empty-state-icon { font-size: 40px; margin-bottom: 12px; }

        /* ── Login screen ── */
        #loginScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .login-card h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
        .login-card h1 span { color: #6366f1; }
        .login-card p { color: #64748b; font-size: 0.9rem; margin-bottom: 24px; }
        .login-error { color: #f87171; font-size: 0.85rem; margin-top: 8px; min-height: 18px; }

        .hint {
            margin-top: 16px;
            background: #0f172a;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.8rem;
            color: #64748b;
        }
        .hint strong { color: #a5f3fc; font-family: monospace; }

        /* ── Notification ── */
        .notification {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
            z-index: 1000;
            animation: slideIn 0.25s ease;
            max-width: 320px;
        }
        .notification.show { display: block; }
        .notification.success { background: #166534; color: #4ade80; border: 1px solid #166534; }
        .notification.error   { background: #7f1d1d; color: #fca5a5; border: 1px solid #7f1d1d; }
        .notification.warning { background: #78350f; color: #fcd34d; border: 1px solid #78350f; }
        @keyframes slideIn {
            from { transform: translateX(120%); opacity: 0; }
            to   { transform: translateX(0);    opacity: 1; }
        }

        /* ── Pending count badge ── */
        #pendingCount {
            background: #6366f1;
            color: #fff;
            border-radius: 9999px;
            padding: 1px 8px;
            font-size: 0.75rem;
            font-weight: 700;
        }
    </style>
</head>
<body>

<!-- ══ Écran de connexion ══════════════════════════════════════════════════════ -->
<div id="loginScreen" style="display:none">
    <div class="login-card">
        <h1>offline<span>Sync</span></h1>
        <p>Client de test NativePHP</p>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" value="test@example.com" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="loginPassword" value="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:11px">
                Se connecter
            </button>
            <div class="login-error" id="loginError"></div>
        </form>
        <div class="hint">
            Compte de démo :<br>
            <strong>test@example.com</strong> / <strong>password</strong>
        </div>
    </div>
</div>

<!-- ══ App principale ═════════════════════════════════════════════════════════ -->
<div id="appScreen" style="display:none">
    <div class="app-layout">

        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-brand">offline<span>Sync</span></div>
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Online</span>
            </div>
            <div class="status-indicator">
                📦 <span id="pendingCount">0</span>
            </div>
            <div class="topbar-actions">
                <button class="btn btn-warning" id="toggleOfflineBtn">⚡ Simuler OFFLINE</button>
                <button class="btn btn-primary" id="syncBtn">🔄 Synchroniser</button>
                <button class="btn btn-outline" id="logoutBtn">Déconnexion</button>
            </div>
        </header>

        <!-- Zone principale -->
        <main class="main-area">
            <!-- Stats -->
            <div class="stats">
                <div class="stat">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="completedCount">0</div>
                    <div class="stat-label">Complétées</div>
                </div>
                <div class="stat">
                    <div class="stat-number" id="pendingTasksCount">0</div>
                    <div class="stat-label">En cours</div>
                </div>
            </div>

            <!-- Formulaire d'ajout -->
            <div class="card">
                <h2>➕ Nouvelle tâche</h2>
                <form id="addTaskForm">
                    <div class="form-group">
                        <label>Titre *</label>
                        <input type="text" id="title" required placeholder="Titre de la tâche…">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="description" placeholder="Détails (optionnel)…"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Priorité</label>
                            <select id="priority">
                                <option value="low">🟢 Basse</option>
                                <option value="medium" selected>🟠 Moyenne</option>
                                <option value="high">🔴 Haute</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Échéance</label>
                            <input type="datetime-local" id="dueDate">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;padding:10px">
                        Ajouter la tâche
                    </button>
                </form>
            </div>

            <!-- Liste des tâches -->
            <div class="card">
                <div class="tasks-header">
                    <h2>Mes tâches</h2>
                </div>
                <div id="tasksList"></div>
            </div>
        </main>

        <!-- Sidebar : Queue + Conflits + Log -->
        <aside class="sidebar">

            <!-- Queue locale -->
            <div class="sidebar-section">
                <div class="sidebar-title">
                    Queue locale (offlineSync)
                    <span class="sidebar-badge" id="queueCount">0</span>
                </div>
                <div id="queueList"><div class="queue-empty">Queue vide ✓</div></div>
                <div style="margin-top:8px">
                    <button class="btn btn-danger" id="clearQueueBtn" style="font-size:0.75rem;padding:5px 10px;width:auto">
                        Vider la queue
                    </button>
                </div>
            </div>

            <!-- Conflits -->
            <div class="sidebar-section">
                <div class="sidebar-title">Conflits détectés</div>
                <div id="conflictList"><div class="queue-empty">Aucun conflit</div></div>
            </div>

            <!-- Log de sync -->
            <div class="sidebar-section" style="flex:1">
                <div class="sidebar-title">Journal de sync</div>
                <div id="syncLog"><div class="queue-empty">Aucun événement</div></div>
            </div>

        </aside>
    </div>
</div>

<!-- Notification toast -->
<div class="notification" id="notification"></div>

<script src="/mobile/app.js"></script>
</body>
</html>
